name: simple_card_v1_2
description: Simple Card is an on-device business card scanner and digital card holder for OCR, review, and PDF export workflows.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.2.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  camera_macos: ^0.0.9
  image_picker: ^1.0.7
  http: ^1.6.0
  url_launcher: ^6.2.0
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  cunning_document_scanner: ^1.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true
